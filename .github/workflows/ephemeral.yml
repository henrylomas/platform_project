name: Ephemeral PR Environments

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

env:
  PR_NUMBER: ${{ github.event.pull_request.number }}
  API_SERVICE: api-pr-${{ github.event.pull_request.number }}
  WEB_SERVICE: web-pr-${{ github.event.pull_request.number }}
  API_IMAGE: ghcr.io/${{ github.repository }}/api:pr-${{ github.event.pull_request.number }}
  WEB_IMAGE: ghcr.io/${{ github.repository }}/web:pr-${{ github.event.pull_request.number }}

jobs:
  # -----------------------------------------------------------------------
  # JOB 1 — deploy
  # Runs on every push to an open PR.
  # Builds both Docker images, deploys to Railway, and posts a status comment.
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy PR environment
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    permissions:
      contents: read
      packages: write    # push images to ghcr.io
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- API image ---------------------------------------------------------
      # Built first so we can get its Railway URL before building the web image.
      # VITE_API_URL must be baked into the web bundle at build time (Vite bakes
      # env vars at build, not runtime), so the API must be deployed before the
      # web image is built.

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.API_IMAGE }}

      # --- Deploy API to Railway ---------------------------------------------

      - name: Deploy API to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          railway service create \
            --name "${{ env.API_SERVICE }}" \
            --project ${{ secrets.RAILWAY_PROJECT_ID }} || true
          railway up \
            --project ${{ secrets.RAILWAY_PROJECT_ID }} \
            --service "${{ env.API_SERVICE }}" \
            --image "${{ env.API_IMAGE }}" \
            --detach

      - name: Get API service URL
        id: api-url
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          domain=$(railway domain \
            --project ${{ secrets.RAILWAY_PROJECT_ID }} \
            --service "${{ env.API_SERVICE }}")
          echo "url=https://${domain}" >> "$GITHUB_OUTPUT"

      # --- Web image ---------------------------------------------------------
      # Built after the API URL is known so VITE_API_URL can be baked in.

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.WEB_IMAGE }}
          build-args: |
            VITE_API_URL=${{ steps.api-url.outputs.url }}

      # --- Deploy web to Railway --------------------------------------------

      - name: Deploy web to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway service create \
            --name "${{ env.WEB_SERVICE }}" \
            --project ${{ secrets.RAILWAY_PROJECT_ID }} || true
          railway up \
            --project ${{ secrets.RAILWAY_PROJECT_ID }} \
            --service "${{ env.WEB_SERVICE }}" \
            --image "${{ env.WEB_IMAGE }}" \
            --detach

      - name: Get web service URL
        id: web-url
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          domain=$(railway domain \
            --project ${{ secrets.RAILWAY_PROJECT_ID }} \
            --service "${{ env.WEB_SERVICE }}")
          echo "url=https://${domain}" >> "$GITHUB_OUTPUT"

      # --- Health checks -----------------------------------------------------

      - name: Wait for API to be healthy
        run: |
          url="${{ steps.api-url.outputs.url }}/health"
          echo "Polling ${url}"
          for i in $(seq 1 30); do
            if curl -sf "${url}" > /dev/null; then
              echo "API is healthy"
              exit 0
            fi
            echo "Attempt ${i}/30 — retrying in 10 s"
            sleep 10
          done
          echo "API did not become healthy within 5 minutes" && exit 1

      - name: Wait for web to be healthy
        run: |
          url="${{ steps.web-url.outputs.url }}"
          echo "Polling ${url}"
          for i in $(seq 1 30); do
            if curl -sf "${url}" > /dev/null; then
              echo "Web is healthy"
              exit 0
            fi
            echo "Attempt ${i}/30 — retrying in 10 s"
            sleep 10
          done
          echo "Web did not become healthy within 5 minutes" && exit 1

      # --- PR comment -------------------------------------------------------
      # Uses an HTML marker comment to find and update the existing comment on
      # subsequent pushes rather than creating a new one each time.

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- preview-env -->';
            const body = [
              marker,
              '## Preview Environment',
              '',
              '| Service | URL |',
              '|---------|-----|',
              '| Frontend | ${{ steps.web-url.outputs.url }} |',
              '| API health | ${{ steps.api-url.outputs.url }}/health |',
              '',
              '**Status:** Both services responding ✓',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(
              (c) => c.user.login === 'github-actions[bot]' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # -----------------------------------------------------------------------
  # JOB 2 — teardown
  # Runs when the PR is closed (merged or abandoned).
  # Deletes both Railway services via the GraphQL API (more reliable in CI
  # than the Railway CLI delete command) and updates the PR comment.
  # -----------------------------------------------------------------------
  teardown:
    name: Tear down PR environment
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    permissions:
      pull-requests: write

    steps:
      # curl and jq are both pre-installed on ubuntu-latest — no CLI needed.

      - name: Delete API service via Railway GraphQL API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          service_id=$(curl -sf \
            -X POST \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"{ project(id: \\\"${RAILWAY_PROJECT_ID}\\\") { services { edges { node { id name } } } } }\"}" \
            https://backboard.railway.app/graphql/v2 \
          | jq -r --arg name "${{ env.API_SERVICE }}" \
              '.data.project.services.edges[] | select(.node.name == $name) | .node.id // empty')

          if [ -z "${service_id}" ]; then
            echo "Service ${{ env.API_SERVICE }} not found — skipping"
            exit 0
          fi

          curl -sf \
            -X POST \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceDelete(id: \\\"${service_id}\\\") }\"}" \
            https://backboard.railway.app/graphql/v2

          echo "Deleted ${{ env.API_SERVICE }} (${service_id})"

      - name: Delete web service via Railway GraphQL API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          service_id=$(curl -sf \
            -X POST \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"{ project(id: \\\"${RAILWAY_PROJECT_ID}\\\") { services { edges { node { id name } } } } }\"}" \
            https://backboard.railway.app/graphql/v2 \
          | jq -r --arg name "${{ env.WEB_SERVICE }}" \
              '.data.project.services.edges[] | select(.node.name == $name) | .node.id // empty')

          if [ -z "${service_id}" ]; then
            echo "Service ${{ env.WEB_SERVICE }} not found — skipping"
            exit 0
          fi

          curl -sf \
            -X POST \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceDelete(id: \\\"${service_id}\\\") }\"}" \
            https://backboard.railway.app/graphql/v2

          echo "Deleted ${{ env.WEB_SERVICE }} (${service_id})"

      - name: Update PR comment — environment removed
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- preview-env -->';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(
              (c) => c.user.login === 'github-actions[bot]' && c.body.includes(marker)
            );

            if (!existing) return;

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: `${marker}\n## Preview Environment\n\n**Status:** Environment removed`,
            });
